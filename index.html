<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFX Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      padding: 2rem;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #f0f0f0;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: end;
      flex-wrap: wrap;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }

    select, .file-label {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e1e4e8;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:hover, .file-label:hover { border-color: #58a6ff; }
    select:focus { outline: none; border-color: #58a6ff; }

    .file-label {
      display: inline-block;
      text-align: center;
      min-width: 180px;
    }

    .file-label.has-file { border-color: #3fb950; color: #3fb950; }

    input[type="file"] { display: none; }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.2rem;
    }

    .card .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 1.3rem; font-weight: 600; margin-top: 0.3rem; }
    .card .value.green { color: #3fb950; }
    .card .value.red { color: #f85149; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border-radius: 8px;
      overflow: hidden;
    }

    thead { background: #1c2129; }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    th:nth-child(5) { text-align: right; }

    td {
      padding: 0.65rem 1rem;
      border-top: 1px solid #21262d;
      font-size: 0.9rem;
    }

    td:nth-child(5) { text-align: right; font-family: 'SF Mono', 'Fira Code', monospace; }
    td:nth-child(6), td:nth-child(7) { text-align: center; font-size: 0.8rem; color: #8b949e; }

    .tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .tag.entrada { background: #0d3321; color: #3fb950; }
    .tag.saida { background: #3d1318; color: #f85149; }

    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: #484f58;
      font-size: 0.95rem;
    }

    .table-wrapper {
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OFX Reader</h1>

    <div class="controls">
      <div class="field">
        <label>Banco</label>
        <select id="bank-select">
          <option value="756">Sicoob</option>
        </select>
      </div>
      <div class="field">
        <label>Arquivo</label>
        <label class="file-label" id="file-label" for="file-input">Selecionar .ofx</label>
        <input type="file" id="file-input" accept=".ofx,.OFX">
      </div>
    </div>

    <button id="export-csv" style="display:none;" class="file-label">Exportar CSV</button>

    <div id="results" style="display:none;">
      <div class="summary">
        <div class="card">
          <div class="label">Conta</div>
          <div class="value" id="account">—</div>
        </div>
        <div class="card">
          <div class="label">Entradas</div>
          <div class="value green" id="total-in">R$ 0,00</div>
        </div>
        <div class="card">
          <div class="label">Saídas</div>
          <div class="value red" id="total-out">R$ 0,00</div>
        </div>
        <div class="card">
          <div class="label">Saldo</div>
          <div class="value" id="balance">R$ 0,00</div>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Mes</th>
              <th>Tipo</th>
              <th>Categoria</th>
              <th>Valor</th>
              <th>Ent.s/R</th>
              <th>Sai.s/A</th>
              <th>Descricao</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="empty" id="empty-state">
      Selecione um arquivo OFX para visualizar as transações
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const fileLabel = document.getElementById('file-label');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      fileLabel.textContent = file.name;
      fileLabel.classList.add('has-file');

      const reader = new FileReader();
      reader.onload = (ev) => {
        let text = ev.target.result;
        if (text.includes('\ufffd')) {
          const latin1Reader = new FileReader();
          latin1Reader.onload = (e2) => parseOFX(e2.target.result);
          latin1Reader.readAsText(file, 'windows-1252');
        } else {
          parseOFX(text);
        }
      };
      reader.readAsText(file, 'utf-8');
    });

    function extractTag(text, tag) {
      const re = new RegExp(`<${tag}>\\s*(.+?)(?:\\s*<|\\s*$)`, 's');
      const m = text.match(re);
      return m ? m[1].trim() : '';
    }

    function parseDate(raw) {
      const clean = raw.split('[')[0].trim();
      if (clean.length >= 8) {
        const y = clean.slice(0, 4);
        const m = clean.slice(4, 6);
        const d = clean.slice(6, 8);
        return `${d}/${m}/${y}`;
      }
      return clean;
    }

    function formatBRL(value) {
      const sign = value < 0 ? '-' : '';
      const abs = Math.abs(value).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return `${sign}R$ ${abs}`;
    }

    const CATEGORIES = {
      '756': [ // Sicoob
        ['PIX RECEBIDO', 'PIX recebido'],
        ['PIX EMITIDO', 'PIX enviado'],
        ['CRÉD.LIQUIDAÇÃO COBRANÇA', 'Boleto creditado'],
        ['CRÉD.TED-STR', 'TED recebida'],
        ['DÉB.TIT.COMPE', 'Boleto pago'],
        ['DÉB.CONV.EN.ELÉTRICA', 'Boleto pago'],
        ['DÉB.CONV.GÁS', 'Boleto pago'],
        ['DÉB.TRANSF.CONTAS', 'Transferência/entre contas'],
        ['CRÉD.TRANSF.CONTAS', 'Transferência/entre contas'],
        ['CRED.TRANSF.CONTAS', 'Transferência/entre contas'],
        ['PAGAMENTO SALARIO', 'Folha de pagamento'],
        ['TARIFA COBRANÇA', 'Tarifa bancária'],
        ['DÉBITO PACOTE SERVIÇOS', 'Tarifa bancária'],
        ['DÉB.IOF', 'Impostos/tributos'],
        ['DÉB.EMPRÉSTIMO', 'Outros débitos'],
        ['JUROS CONTA GARANTIDA', 'Outros débitos'],
        ['DEB.PARCELAS', 'Outros débitos'],
      ],
    };

    const CARD_PATTERNS = {
      '756': [
        [['MASTERCARD', 'DÉB.CONV'], 'Pagamento Cartão de Crédito'],
        [['VISA', 'DÉB.CONV'], 'Pagamento Cartão de Crédito'],
      ],
    };

    const INVESTMENT_KW = ['RESGATE', 'APLICAÇÃO', 'APLICACAO'];

    function categorize(memo, amount, bankId) {
      const upper = memo.toUpperCase();
      for (const [keywords, cat] of (CARD_PATTERNS[bankId] || [])) {
        if (keywords.every(k => upper.includes(k.toUpperCase()))) return cat;
      }
      for (const [pattern, cat] of (CATEGORIES[bankId] || [])) {
        if (upper.includes(pattern.toUpperCase())) return cat;
      }
      return amount >= 0 ? 'Outros créditos' : 'Outros débitos';
    }

    function deriveMonth(dateStr) {
      const p = dateStr.split('/');
      return p.length === 3 ? `${p[2]}-${p[1]}` : '';
    }

    function isEntradaSemResgates(amount, memo) {
      if (amount < 0) return false;
      const u = memo.toUpperCase();
      return !INVESTMENT_KW.some(k => u.includes(k));
    }

    function isSaidaSemAplicacao(amount, memo) {
      if (amount >= 0) return false;
      const u = memo.toUpperCase();
      return !INVESTMENT_KW.some(k => u.includes(k));
    }

    function parseOFX(content) {
      const account = extractTag(content, 'ACCTID');
      const balanceStr = extractTag(content, 'BALAMT');
      const balance = parseFloat(balanceStr.replace(',', '.')) || 0;
      const bankId = document.getElementById('bank-select').value;

      const blocks = [...content.matchAll(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/g)];
      const transactions = blocks.map(m => {
        const block = m[1];
        const amount = parseFloat(extractTag(block, 'TRNAMT').replace(',', '.')) || 0;
        const memo = extractTag(block, 'MEMO');
        const date = parseDate(extractTag(block, 'DTPOSTED'));
        return {
          date,
          month: deriveMonth(date),
          type: amount >= 0 ? 'Entrada' : 'Saída',
          category: categorize(memo, amount, bankId),
          amount,
          entradaSemResgates: isEntradaSemResgates(amount, memo),
          saidaSemAplicacao: isSaidaSemAplicacao(amount, memo),
          memo,
        };
      });

      transactions.sort((a, b) => a.date.localeCompare(b.date));
      render(account, balance, transactions);
    }

    function render(account, balance, transactions) {
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      document.getElementById('export-csv').style.display = 'inline-block';

      document.getElementById('account').textContent = account || '—';

      let totalIn = 0, totalOut = 0;
      transactions.forEach(t => {
        if (t.amount >= 0) totalIn += t.amount;
        else totalOut += t.amount;
      });

      document.getElementById('total-in').textContent = formatBRL(totalIn);
      document.getElementById('total-out').textContent = formatBRL(totalOut);
      document.getElementById('balance').textContent = formatBRL(balance || totalIn + totalOut);

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = transactions.map(t => `
        <tr>
          <td>${t.date}</td>
          <td>${t.month}</td>
          <td><span class="tag ${t.type === 'Entrada' ? 'entrada' : 'saida'}">${t.type}</span></td>
          <td>${t.category}</td>
          <td>${formatBRL(t.amount)}</td>
          <td>${t.entradaSemResgates ? 'TRUE' : ''}</td>
          <td>${t.saidaSemAplicacao ? 'TRUE' : ''}</td>
          <td>${t.memo}</td>
        </tr>
      `).join('');

      window._transactions = transactions;
    }

    document.getElementById('export-csv').addEventListener('click', () => {
      const t = window._transactions;
      if (!t || !t.length) return;

      const header = 'Data,Mês,Tipo,Categoria,Valor,Conta_Entrada_sem_resgates,Conta_Saida_sem_aplicação,Descricao\n';
      const rows = t.map(r =>
        `${r.date},${r.month},${r.type},${r.category},"${r.amount.toFixed(2).replace('.', ',')}",${r.entradaSemResgates},${r.saidaSemAplicacao},"${r.memo.replace(/"/g, '""')}"`
      ).join('\n');

      const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'extrato.csv';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
